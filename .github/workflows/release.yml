name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: auto_tms_win
            zip_name: auto_tms_win.zip
          - os: macos-latest
            artifact_name: auto_tms_mac
            zip_name: auto_tms_mac.zip

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[all,gui]"
          pip install pyinstaller

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Build with PyInstaller
        run: pyinstaller build/auto_tms.spec --distpath dist

      - name: Zip output folder
        shell: bash
        run: |
          cd dist
          if [ -d "auto_tms" ]; then
            7z a -r "${{ matrix.zip_name }}" auto_tms/ || zip -r "${{ matrix.zip_name }}" auto_tms/
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: dist/${{ matrix.zip_name }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/auto_tms_win/auto_tms_win.zip
            artifacts/auto_tms_mac/auto_tms_mac.zip
          body: |
            ## 桌面版（推薦）

            下載對應平台的壓縮檔，解壓後執行 `auto_tms` 即可。

            | 平台 | 下載 | 說明 |
            |------|------|------|
            | Windows | `auto_tms_win.zip` | 解壓 → 執行 `auto_tms.exe` |
            | macOS | `auto_tms_mac.zip` | 解壓 → 右鍵打開 `auto_tms` |

            啟動後在「設定」頁輸入帳號密碼，切到「執行」頁按「開始」。

            ## CLI（開發者）

            ```bash
            git clone https://github.com/mantour/auto_tms.git && cd auto_tms
            make setup        # 安裝套件、下載瀏覽器
            make config       # 設定帳號密碼
            make run          # 開始自動完成課程
            make status       # 查看進度
            ```
