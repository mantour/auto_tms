name: Build & Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact: auto_tms_win.exe
            pyinstaller_ext: .exe
          - os: macos-latest
            artifact: auto_tms_mac
            pyinstaller_ext: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install ".[all,gui]"
          pip install pyinstaller

      - name: Install Playwright Chromium
        run: playwright install chromium

      - name: Build with PyInstaller
        run: pyinstaller build/auto_tms.spec --distpath dist

      - name: Rename artifact
        shell: bash
        run: |
          if [ -f "dist/auto_tms${{ matrix.pyinstaller_ext }}" ]; then
            cp "dist/auto_tms${{ matrix.pyinstaller_ext }}" "dist/${{ matrix.artifact }}"
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/${{ matrix.artifact }}

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/auto_tms_win.exe/auto_tms_win.exe
            artifacts/auto_tms_mac/auto_tms_mac
          generate_release_notes: true
